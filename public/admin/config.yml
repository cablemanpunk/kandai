backend:
  name: github
  repo: cablemanpunk/kandai
  branch: main
  base_url: https://api.github.com
  site_domain: cablemanpunk.github.io
  auth_endpoint: oauth
  commit_messages:
    create: 'Create {{collection}} "{{slug}}"'
    update: 'Update {{collection}} "{{slug}}"'
    delete: 'Delete {{collection}} "{{slug}}"'
    uploadMedia: '[skip ci] Upload "{{path}}"'
    deleteMedia: '[skip ci] Delete "{{path}}"'

site_url: https://cablemanpunk.github.io/kandai/

display_url: https://cablemanpunk.github.io/kandai/

logo_url: /images/logo.png

media_folder: "src/images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Страницы"
    folder: "src/content/pages"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Заголовок", name: "title", widget: "string" }
      - { label: "Описание", name: "description", widget: "text" }
      - { label: "Содержание", name: "body", widget: "markdown" }

  - name: "posts"
    label: "Блог"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Заголовок", name: "title", widget: "string" }
      - { label: "Дата публикации", name: "date", widget: "datetime" }
      - { label: "Описание", name: "description", widget: "text" }
      - { label: "Изображение", name: "image", widget: "image", required: false }
      - { label: "Содержание", name: "body", widget: "markdown" }

  - name: "services"
    label: "Услуги"
    folder: "src/content/services"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Название услуги", name: "title", widget: "string" }
      - { label: "Краткое описание", name: "summary", widget: "text" }
      - { label: "Цена", name: "price", widget: "string", required: false }
      - { label: "Изображение", name: "image", widget: "image", required: false }
      - { label: "Подробное описание", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Настройки сайта"
    files:
      - file: "src/content/settings/site.md"
        label: "Основные настройки"
        name: "site"
        fields:
          - { label: "Название компании", name: "company_name", widget: "string" }
          - { label: "Описание компании", name: "company_description", widget: "text" }
          - { label: "Контакты", name: "contacts", widget: "object", fields: [
              { label: "Email", name: "email", widget: "string" },
              { label: "Телефон", name: "phone", widget: "string" },
              { label: "Адрес", name: "address", widget: "text" }
            ]}
          - { label: "Социальные сети", name: "social", widget: "list", fields: [
              { label: "Название", name: "name", widget: "string" },
              { label: "URL", name: "url", widget: "string" }
            ]}
