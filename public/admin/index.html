<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager - Kandai Systems</title>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
  </style>
</head>
<body>
  <script>
    var CMS_CONFIG = {
      backend: {
        name: 'github',
        repo: 'cablemanpunk/kandai',
        branch: 'main',
        base_url: 'https://api.github.com',
        site_domain: 'cablemanpunk.github.io'
      },
      site_url: 'https://cablemanpunk.github.io/kandai/',
      display_url: 'https://cablemanpunk.github.io/kandai/',
      media_folder: 'src/images',
      public_folder: '/images',
      collections: [
        {
          name: 'pages',
          label: 'Страницы',
          folder: 'src/content/pages',
          create: true,
          slug: '{{slug}}',
          fields: [
            { label: 'Заголовок', name: 'title', widget: 'string' },
            { label: 'Описание', name: 'description', widget: 'text' },
            { label: 'Содержание', name: 'body', widget: 'markdown' }
          ]
        },
        {
          name: 'blog',
          label: 'Блог',
          folder: 'src/content/blog',
          create: true,
          slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
          fields: [
            { label: 'Заголовок', name: 'title', widget: 'string' },
            { label: 'Дата публикации', name: 'date', widget: 'datetime' },
            { label: 'Описание', name: 'description', widget: 'text' },
            { label: 'Изображение', name: 'image', widget: 'image', required: false },
            { label: 'Содержание', name: 'body', widget: 'markdown' }
          ]
        },
        {
          name: 'services',
          label: 'Услуги',
          folder: 'src/content/services',
          create: true,
          slug: '{{slug}}',
          fields: [
            { label: 'Название услуги', name: 'title', widget: 'string' },
            { label: 'Краткое описание', name: 'summary', widget: 'text' },
            { label: 'Цена', name: 'price', widget: 'string', required: false },
            { label: 'Изображение', name: 'image', widget: 'image', required: false },
            { label: 'Подробное описание', name: 'body', widget: 'markdown' }
          ]
        }
      ]
    };
    
    if (window.DecapCMS) {
      window.CMS = window.DecapCMS;
      CMS.init({ config: CMS_CONFIG });
    }
  </script>
</body>
</html>
